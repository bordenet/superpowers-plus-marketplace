# Receives version update dispatches from superpowers-plus
# Updates the version in marketplace.json and commits
# Supports both repository_dispatch (automated) and workflow_dispatch (manual)

name: Version Sync

on:
  repository_dispatch:
    types: [version-update]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set (e.g., 2.2.0)'
        required: true

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync Plugin Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from dispatch
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            SOURCE="${{ github.event.client_payload.source }}"
          else
            VERSION="${{ inputs.version }}"
            SOURCE="manual"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SOURCE=$SOURCE" >> $GITHUB_OUTPUT
          echo "Received version: $VERSION from $SOURCE"

      - name: Update marketplace.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # Update superpowers-plus version in marketplace.json
          jq --arg v "$VERSION" '(.plugins[] | select(.name == "superpowers-plus")).version = $v' \
            .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json
          
          echo "Updated superpowers-plus to version $VERSION"
          cat .claude-plugin/marketplace.json

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SOURCE="${{ steps.version.outputs.SOURCE }}"
          
          # Check if there are changes
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "No changes to commit (version already up to date)"
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump superpowers-plus to $VERSION

Triggered by: $SOURCE"
          git push
          echo "Committed version update"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SOURCE="${{ steps.version.outputs.SOURCE }}"
          
          echo "## Marketplace Version Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugin:** superpowers-plus" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** $SOURCE" >> $GITHUB_STEP_SUMMARY

